deploy:
  runs-on: ubuntu-latest
  needs: build
  permissions:
    id-token: write
    contents: read

  steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CF8131694CAB410B87815C4EC8A41EE1 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4744DE4E80434FB0A6A2DC42065E6FD8 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6258519989944BCEBD47D5ED24013E24 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'afriqueeuropeconnexionvmetcweb'
        package: .
